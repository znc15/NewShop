version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: newshop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: newshop-meili
    environment:
      MEILI_MASTER_KEY: newshop-master-key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meilisearch/data

volumes:
  postgres_data:
  redis_data:
  meili_data:
