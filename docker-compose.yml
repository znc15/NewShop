name: newshop

services:
  postgres:
    image: postgres:15
    container_name: newshop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newshop"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - newshop-network

  redis:
    image: redis:7
    container_name: newshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - newshop-network

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: newshop-meili
    environment:
      MEILI_MASTER_KEY: newshop-master-key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - newshop-network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: newshop-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=newshop
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_API_KEY=newshop-master-key
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRY=24h
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - newshop-network
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: newshop-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - newshop-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  newshop-network:
    driver: bridge