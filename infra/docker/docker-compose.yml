# Docker Compose 配置 - NewShop 完整开发环境
# 包含数据库、缓存、搜索引擎、监控服务和应用服务

name: newshop-infra

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15.10
    container_name: newshop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: newshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7
    container_name: newshop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Meilisearch 搜索引擎
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: newshop-meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-newshop-master-key}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "if command -v wget >/dev/null 2>&1; then wget -q -O - http://127.0.0.1:7700/health >/dev/null 2>&1; elif command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1:7700/health >/dev/null; else echo '缺少 wget/curl，无法执行健康检查' >&2; exit 1; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 后端 API 服务
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: newshop-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_MODE: debug
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: newshop
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-newshop-master-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-for-docker}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if command -v wget >/dev/null 2>&1; then wget -q -O - http://127.0.0.1:8080/health >/dev/null 2>&1; elif command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1:8080/health >/dev/null; else echo '缺少 wget/curl，无法执行健康检查' >&2; exit 1; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 前端 Web 服务
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    container_name: newshop-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if command -v wget >/dev/null 2>&1; then wget -q -O - http://127.0.0.1/health >/dev/null 2>&1; elif command -v curl >/dev/null 2>&1; then curl -fsS http://127.0.0.1/health >/dev/null; else echo '缺少 wget/curl，无法执行健康检查' >&2; exit 1; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: newshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.1.0
    container_name: newshop-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
  prometheus_data:
  grafana_data:
